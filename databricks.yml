# DABs Documentation: https://docs.databricks.com/dev-tools/bundles/index.html
bundle:
  name: telecom_mlops
  uuid: 5aa3cbeb-68e6-4552-8155-f05c286681d1

include:
  - resources/*.yml

artifacts:
  default:
    type: whl
    build: uv build
    path: .

variables:
  git_sha:
    description: git commit hash
    default: develop
  branch:
    description: branch
    default: main
  schedule_pause_status:
    description: schedule pause status
    default: PAUSED

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://8259559314352370.0.gcp.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}
    variables:
      git_sha: develop
      branch: DEV
      schedule_pause_status: PAUSED

  acc:
    presets:
      name_prefix: "[staging] "
    workspace:
      host: https://8259559314352370.0.gcp.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      branch: ACC
      schedule_pause_status: PAUSED

  prd:
    mode: production
    workspace:
      host: https://8259559314352370.0.gcp.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      branch: PROD
      schedule_pause_status: PAUSED
    permissions:
      - user_name: amicampos2001@gmail.com
        level: CAN_MANAGE